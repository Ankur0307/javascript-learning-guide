<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Recap Guide banner</title>
  <desc id="desc">Minimal premium banner for a JavaScript learning guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111D"/>
      <stop offset="0.55" stop-color="#0B1627"/>
      <stop offset="1" stop-color="#111D31"/>
    </linearGradient>
    <linearGradient id="accent" x1="48" y1="48" x2="324" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1200" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="218" rx="24" fill="url(#bg)" stroke="#22314B"/>
  <circle cx="1030" cy="52" r="74" fill="#67E8F9" opacity="0.10" filter="url(#blur)"/>
  <circle cx="1110" cy="156" r="62" fill="#FBBF24" opacity="0.08" filter="url(#blur)"/>
  <circle cx="260" cy="180" r="58" fill="#A78BFA" opacity="0.07" filter="url(#blur)"/>

  <rect x="48" y="44" width="280" height="4" rx="2" fill="url(#accent)"/>

  <text x="48" y="112" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="0.2">JavaScript Recap Guide</text>
  <text x="48" y="147" fill="#B7C4D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="400">MDN-based quick revision for beginners</text>

  <rect x="828" y="48" width="318" height="124" rx="18" fill="#0B1322" stroke="#22314B"/>
  <text x="858" y="89" fill="#67E8F9" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="18" font-weight="600">const guide =</text>
  <text x="858" y="122" fill="#F8FAFC" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="18" font-weight="500">"read • run • change";</text>
  <text x="858" y="150" fill="#B7C4D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="400">small examples. clear recap.</text>
</svg>
